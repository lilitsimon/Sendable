<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sendable</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <p class="eyebrow">Sendable</p>
        <h1>Make your writing clearer and easier to send</h1>
      </header>

      <section class="panel">
        <div class="section-header">
          <label for="draftInput">Your text</label>
          <button id="useSelectionButton" class="ghost-button" type="button">Use selected text</button>
        </div>

        <textarea
          id="draftInput"
          placeholder="Paste or type your message, email, note, or other professional text here. We'll make it clearer, more natural, and easier to send, without changing your voice."
        ></textarea>

        <div class="toolbar">
          <span id="inputCount" class="meta">0 characters</span>
          <div class="actions">
            <button id="clearButton" class="ghost-button" type="button">Clear</button>
            <button id="improveButton" class="primary-button" type="button">Improve text</button>
          </div>
        </div>
      </section>

      <section class="panel panel-output">
        <div class="section-header">
          <label for="outputInput">Refined version</label>
          <span id="statusText" class="meta">Ready</span>
        </div>

        <textarea id="outputInput" readonly placeholder="Your refined text will appear here."></textarea>

        <div class="toolbar">
          <span id="toast" class="meta" aria-live="polite"></span>
          <div class="actions">
            <button id="retryButton" class="ghost-button" type="button">Try again</button>
            <button id="copyButton" class="secondary-button" type="button">Copy</button>
          </div>
        </div>
      </section>
    </main>

    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
  </html>
